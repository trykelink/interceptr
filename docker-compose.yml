# docker-compose.yml — Local development environment: Interceptr + PostgreSQL
services:
  interceptr:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://interceptr:interceptr123@db:5432/interceptr}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Optional policy mount: keep this only when ./policy.yaml exists.
      - ./policy.yaml:/app/policy.yaml:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interceptr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interceptr123}
      POSTGRES_DB: ${POSTGRES_DB:-interceptr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interceptr}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
