# docker-compose.yml — Interceptr + PostgreSQL stack
# Env vars are read from .env in the same directory as this file (e.g. ~/.interceptr/.env).
# All values have defaults so it works with no .env file.
services:
  interceptr:
    build:
      context: https://github.com/trykelink/interceptr.git
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://interceptr:CHANGE_ME_IN_PRODUCTION@db:5432/interceptr}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interceptr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: ${POSTGRES_DB:-interceptr}
    # Keep PostgreSQL internal by default. Expose 5432 only in local development.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interceptr}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

volumes:
  postgres_data:
